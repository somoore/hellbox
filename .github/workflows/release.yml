name: release

# Build release assets for deploy.sh.

on:
  push:
    tags: ['v*']

# Restrictive default; each job opts into exactly what it needs.
permissions: {}

jobs:
  # Create the release once, before the matrix fans out — six concurrent
  # "create release" calls race on the tag and exhaust their retries.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" --generate-notes

  build:
    name: ${{ matrix.asset }}
    needs: create-release
    permissions:
      contents: write       # attach assets to the release
      attestations: write   # build-provenance attestation
      id-token: write       # OIDC for attestation signing
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  asset: hellbox-linux-x86_64 }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, asset: hellbox-linux-arm64 }
          # macOS x86_64 cross-compiles reliably from Apple Silicon.
          - { runner: macos-14,         target: x86_64-apple-darwin,       asset: hellbox-macos-x86_64 }
          - { runner: macos-14,         target: aarch64-apple-darwin,      asset: hellbox-macos-arm64 }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc,    asset: hellbox-windows-x86_64.exe }
          - { runner: windows-11-arm,   target: aarch64-pc-windows-msvc,   asset: hellbox-windows-arm64.exe }
    defaults:
      run:
        working-directory: rs-cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate tag source
        shell: bash
        working-directory: .
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Release assets must be built from a tag ref so deploy.sh can verify attestations against refs/tags/<tag>."
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-rs needs NASM for x86 asm.
      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b # v1

      - name: Build
        env:
          # Windows: statically link the CRT so the exe runs on machines without
          # the VC++ redistributable (winget validation VMs, clean installs).
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}
        run: cargo build --release --features proxy --target ${{ matrix.target }}

      - name: Stage asset (unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/hellbox" "${{ matrix.asset }}"

      - name: Stage asset (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/hellbox.exe" "${{ matrix.asset }}"

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_DEVELOPER_ID_CERTIFICATE:?APPLE_DEVELOPER_ID_CERTIFICATE secret is required}"
          : "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD:?APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD secret is required}"

          certificate_path="$RUNNER_TEMP/apple-developer-id.p12"
          keychain_path="$RUNNER_TEMP/hellbox-signing.keychain-db"
          keychain_password="$(uuidgen)$(uuidgen)"

          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s \
            "$keychain_path" \
            "$HOME/Library/Keychains/login.keychain-db"
          rm -f "$certificate_path"

      - name: Sign macOS asset
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: 'Developer ID Application: Scott Moore (FC439DPN89)'
        run: |
          set -euo pipefail
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "${{ matrix.asset }}"
          codesign --verify --strict --verbose=2 "${{ matrix.asset }}"

      # Apple's notarization service accepts ZIP, DMG, or PKG uploads. The
      # release asset remains the raw signed executable, so wrap it only for
      # submission; standalone Mach-O files cannot have a ticket stapled.
      - name: Notarize macOS asset
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          : "${APPLE_NOTARY_ISSUER_ID:?APPLE_NOTARY_ISSUER_ID secret is required}"
          : "${APPLE_NOTARY_KEY_ID:?APPLE_NOTARY_KEY_ID secret is required}"
          : "${APPLE_NOTARY_PRIVATE_KEY:?APPLE_NOTARY_PRIVATE_KEY secret is required}"

          notary_key="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          notary_archive="$RUNNER_TEMP/${{ matrix.asset }}.zip"
          trap 'rm -f "$notary_key" "$notary_archive"' EXIT

          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" > "$notary_key"
          chmod 600 "$notary_key"
          ditto -c -k --keepParent "${{ matrix.asset }}" "$notary_archive"
          xcrun notarytool submit "$notary_archive" \
            --key "$notary_key" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

          codesign --verify --strict --verbose=2 "${{ matrix.asset }}"

      - name: Checksum asset
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Attest asset
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: rs-cli/${{ matrix.asset }}

      - name: Attach to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            rs-cli/${{ matrix.asset }}
            rs-cli/${{ matrix.asset }}.sha256

  # Nudge the Homebrew tap to pick this release up immediately. The tap polls
  # every 6h on its own (no secret needed for that); this job just removes the
  # lag. Needs a fine-grained PAT with actions:write on somoore/homebrew-hellbox
  # in the TAP_TOKEN secret; skips cleanly when absent.
  brew-tap:
    name: brew tap bump
    needs: build
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Dispatch tap formula update
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set — tap will self-update within 6h via its cron"
            exit 0
          fi
          GH_TOKEN="$TAP_TOKEN" gh workflow run update-formula --repo somoore/homebrew-hellbox

  # Submit the new version to microsoft/winget-pkgs. Needs a classic PAT with
  # `public_repo` scope in the WINGET_TOKEN secret (wingetcreate forks/PRs
  # winget-pkgs under that identity); skips cleanly when the secret is absent.
  # The Homebrew tap needs nothing here: somoore/homebrew-hellbox polls
  # releases itself and attestation-verifies before bumping its formula.
  winget:
    name: winget submit
    needs: build
    runs-on: windows-latest
    permissions: {}
    steps:
      - name: Verify release attestations
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:GITHUB_REF_NAME
          # SECURITY: the manifests we submit pin whatever these assets hash to,
          # so verify build provenance before handing hashes to winget-pkgs.
          foreach ($asset in "hellbox-windows-x86_64.exe", "hellbox-windows-arm64.exe") {
            curl.exe -fsSL -o $asset "https://github.com/somoore/hellbox/releases/download/$tag/$asset"
            gh attestation verify $asset --repo somoore/hellbox `
              --signer-workflow "github.com/somoore/hellbox/.github/workflows/release.yml" `
              --source-ref "refs/tags/$tag"
          }

      - name: Submit somoore.hellbox update
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            Write-Host "WINGET_TOKEN not set - skipping winget submission"
            exit 0
          }
          $ErrorActionPreference = "Stop"
          $wcVersion = "v1.12.8.0"
          $wcSha256 = "8BD738851B524885410112678E3771B341C5C716DE60FBBECB88AB0A363ED85D"
          curl.exe -fsSL -o wingetcreate.exe "https://github.com/microsoft/winget-create/releases/download/$wcVersion/wingetcreate.exe"
          $actual = (Get-FileHash wingetcreate.exe -Algorithm SHA256).Hash
          if ($actual -ne $wcSha256) { throw "wingetcreate.exe SHA256 mismatch: $actual" }
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart("v")
          $base = "https://github.com/somoore/hellbox/releases/download/$tag"
          .\wingetcreate.exe update somoore.hellbox --version $version `
            --urls "$base/hellbox-windows-x86_64.exe" "$base/hellbox-windows-arm64.exe" `
            --submit --token $env:WINGET_TOKEN
