# Rust dependency license policy for the hellbox CLI.
#
# This is intentionally scoped to Cargo dependencies. Capsule/image licensing is tracked in
# THIRD_PARTY_NOTICES.md because the image includes OS packages, Python wheels, Chocolate Doom,
# ffmpeg, noVNC, SDL, and game data that cargo-deny cannot inspect.

[graph]
features = ["proxy"]

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "bzip2-1.0.6",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[[licenses.exceptions]]
name = "option-ext"
version = "0.2.0"
allow = ["MPL-2.0"]

# Supply-chain: only allow crates from crates.io. An unknown registry or an
# unpinned git dependency (no rev) is a supply-chain risk, so deny both.
# Enforced by `cargo deny check sources` (CI rust-deny job + scripts/check-deps.sh).
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
