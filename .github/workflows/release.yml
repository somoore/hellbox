name: release

# Build release assets for deploy.sh.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  asset: ldoom-linux-x86_64 }
          - { runner: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, asset: ldoom-linux-arm64 }
          # macOS x86_64 cross-compiles reliably from Apple Silicon.
          - { runner: macos-14,         target: x86_64-apple-darwin,       asset: ldoom-macos-x86_64 }
          - { runner: macos-14,         target: aarch64-apple-darwin,      asset: ldoom-macos-arm64 }
          - { runner: windows-latest,   target: x86_64-pc-windows-msvc,    asset: ldoom-windows-x86_64.exe }
          - { runner: windows-11-arm,   target: aarch64-pc-windows-msvc,   asset: ldoom-windows-arm64.exe }
    defaults:
      run:
        working-directory: rs-cli
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # aws-lc-rs needs NASM for x86 asm.
      - uses: ilammy/setup-nasm@v1

      - name: Build
        run: cargo build --release --features proxy --target ${{ matrix.target }}

      - name: Stage asset (unix)
        if: runner.os != 'Windows'
        run: cp "target/${{ matrix.target }}/release/ldoom" "${{ matrix.asset }}"

      - name: Stage asset (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp "target/${{ matrix.target }}/release/ldoom.exe" "${{ matrix.asset }}"

      - name: Checksum asset
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi

      - name: Attest asset
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: rs-cli/${{ matrix.asset }}

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            rs-cli/${{ matrix.asset }}
            rs-cli/${{ matrix.asset }}.sha256
