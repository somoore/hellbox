name: ci

on:
  pull_request:
  push:
    branches: [main]
  # Weekly so a newly-disclosed advisory in an unchanged lockfile still surfaces.
  schedule:
    - cron: '0 12 * * 1'

permissions:
  contents: read

jobs:
  # Decide which code checks are relevant to this change. A docs-only commit
  # (e.g. just *.md) lights up nothing here, so every code job below is skipped —
  # but the `secrets` job has NO gate and always runs, so security is never traded
  # away for speed. Skipped `if:` jobs report SUCCESS, so this stays compatible with
  # required-status-check branch protection (no job gets stuck "Expected").
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.f.outputs.rust }}
      python: ${{ steps.f.outputs.python }}
      js: ${{ steps.f.outputs.js }}
      shell: ${{ steps.f.outputs.shell }}
      capsule: ${{ steps.f.outputs.capsule }}
      deps: ${{ steps.f.outputs.deps }}
      cfn: ${{ steps.f.outputs.cfn }}
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: f
        with:
          # Each category maps to the files that affect that job. Changing the
          # workflow itself ('.github/workflows/ci.yml') re-runs every category, so
          # it's listed in each filter (a paths-filter list must be flat globs —
          # YAML anchors nest a sub-list and break matching, so spell it out).
          filters: |
            rust:
              - '.github/workflows/ci.yml'
              - 'rs-cli/**'
            python:
              - '.github/workflows/ci.yml'
              - '**/*.py'
              - '.flake8'
            js:
              - '.github/workflows/ci.yml'
              - '**/*.mjs'
              - '**/*.js'
            shell:
              - '.github/workflows/ci.yml'
              - '**/*.sh'
            capsule:
              - '.github/workflows/ci.yml'
              - 'capsule/**'
              - 'scripts/check-reqs.sh'
            deps:
              - '.github/workflows/ci.yml'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/requirements*.txt'
              - '**/package.json'
              - 'deny.toml'
              - '.pre-commit-config.yaml'
              - 'scripts/check-deps.sh'
              - 'scripts/check-precommit-pins.sh'
            cfn:
              - '.github/workflows/ci.yml'
              - 'deploy/**'
            # Any non-doc source file — gates the cross-language duplicate scan.
            code:
              - '.github/workflows/ci.yml'
              - 'rs-cli/**'
              - 'capsule/**'
              - 'scripts/**'
              - '**/*.rs'
              - '**/*.py'
              - '**/*.mjs'
              - '**/*.js'
              - '**/*.sh'

  # SECURITY: always runs, on every commit, regardless of which files changed.
  # A secret can land in any file type (a token pasted into a README, a key in a
  # docs snippet), so this is never path-filtered. Scans full history.
  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify all workflow actions are SHA-pinned
        run: scripts/check-action-pins.sh
      - name: Verify pre-commit hooks are SHA-pinned
        run: scripts/check-precommit-pins.sh
      - name: Verify release provenance binding
        run: scripts/check-release-provenance.sh
      - name: Install gitleaks
        run: |
          VER=8.30.1
          curl -fsSL -o /tmp/gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          sudo tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full history
        run: gitleaks detect --no-banner --redact --source .

  rust:
    name: rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rs-cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --features proxy -- -D warnings
      - name: Test
        run: cargo test --features proxy

  rust-deny:
    name: rust deny (advisories + licenses)
    needs: changes
    # Deps changes OR the scheduled run (so a new advisory in an unchanged lockfile
    # still surfaces even though no files changed).
    if: needs.changes.outputs.deps == 'true' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable
          manifest-path: rs-cli/Cargo.toml
          arguments: ""
          command: check
          # advisories gates RUSTSEC CVEs (the careful rustls/webpki pinning in
          # Cargo.toml has no regression guard otherwise); licenses keeps the
          # allow-list policy; sources rejects crates from unknown registries / unpinned
          # git deps (supply-chain). Verified: `cargo deny check advisories licenses sources`.
          command-arguments: advisories licenses sources

  shell:
    name: shellcheck
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs shellcheck
      - name: Check uninstall deletion safety
        run: scripts/check-uninstall-safety.sh

  cloudformation:
    name: cfn-lint
    needs: changes
    if: needs.changes.outputs.cfn == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
      - name: Install cfn-lint
        run: python -m pip install cfn-lint
      - name: Lint templates
        run: cfn-lint deploy/doom.yaml

  # Catch capsule breaks WITHOUT the ~6-min cloud build: stale wheel hashes (M3),
  # Dockerfile smells, and broken capsule Python — the realistic failure modes.
  capsule:
    name: capsule
    needs: changes
    if: needs.changes.outputs.capsule == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Match the capsule runtime so py_compile catches 3.11-invalid syntax.
          python-version: '3.11'
      - name: Verify capsule wheel hashes (cp311/aarch64, all glibc tiers)
        run: scripts/check-reqs.sh
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: capsule/Dockerfile
      - name: Compile-check capsule Python
        run: python -m py_compile capsule/rootfs/opt/capsule/*.py
      - name: Shellcheck capsule scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck capsule/rootfs/opt/capsule/*.sh

  # Python lint (capsule stream/input/focus scripts). Reads .flake8.
  python:
    name: python (flake8)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 .

  # JS syntax check for the one demo .mjs (no eslint footprint for ~40 lines).
  javascript:
    name: javascript (node --check)
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: for f in $(git ls-files '*.mjs' '*.js'); do node --check "$f"; done

  # Supply-chain pin/hash gate across cargo/pip/npm.
  deps:
    name: dependency pins
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Pre-commit hook pin gate
        run: scripts/check-precommit-pins.sh
      - name: Pin/hash gate
        run: scripts/check-deps.sh

  # Duplicate-code detection across Rust/Python/Bash/JS (threshold 0 in .jscpd.json).
  duplication:
    name: duplicate code (jscpd)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: npx --yes jscpd@4 --config .jscpd.json
