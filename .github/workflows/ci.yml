name: ci

on:
  pull_request:
  push:
    branches: [main]
  # Weekly so a newly-disclosed advisory in an unchanged lockfile still surfaces.
  schedule:
    - cron: '0 12 * * 1'

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --features proxy -- -D warnings
      - name: Test
        run: cargo test --features proxy

  rust-deny:
    name: rust deny (advisories + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable
          manifest-path: rs-cli/Cargo.toml
          arguments: ""
          command: check
          # advisories gates RUSTSEC CVEs (the careful rustls/webpki pinning in
          # Cargo.toml has no regression guard otherwise); licenses keeps the
          # allow-list policy. Verified locally: `cargo deny check advisories licenses`.
          command-arguments: advisories licenses

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs shellcheck

  cloudformation:
    name: cfn-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install cfn-lint
        run: python -m pip install cfn-lint
      - name: Lint templates
        run: cfn-lint deploy/doom.yaml

  # Catch capsule breaks WITHOUT the ~6-min cloud build: stale wheel hashes (M3),
  # Dockerfile smells, and broken capsule Python — the realistic failure modes.
  capsule:
    name: capsule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Match the capsule runtime so py_compile catches 3.11-invalid syntax.
          python-version: '3.11'
      - name: Verify capsule wheel hashes (cp311/aarch64, all glibc tiers)
        run: scripts/check-reqs.sh
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: capsule/Dockerfile
      - name: Compile-check capsule Python
        run: python -m py_compile capsule/rootfs/opt/capsule/*.py
      - name: Shellcheck capsule scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck capsule/rootfs/opt/capsule/*.sh
