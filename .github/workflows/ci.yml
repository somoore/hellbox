name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rs-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --features proxy -- -D warnings
      - name: Test
        run: cargo test --features proxy

  rust-licenses:
    name: rust licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: stable
          manifest-path: rs-cli/Cargo.toml
          arguments: ""
          command: check
          command-arguments: licenses

  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs shellcheck

  cloudformation:
    name: cfn-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install cfn-lint
        run: python -m pip install cfn-lint
      - name: Lint templates
        run: cfn-lint deploy/doom.yaml
