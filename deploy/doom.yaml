AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Hellbox prerequisites: build artifact bucket and IAM roles for Lambda MicroVMs.
  Copy Outputs into ~/.hellbox/config.toml after deploy.

Parameters:
  BuildServicePrincipal:
    Type: String
    Default: lambda.amazonaws.com
    AllowedValues:
      - lambda.amazonaws.com
    Description: >
      Service principal trusted by the build and execution roles.

Resources:
  # Short-lived private build contexts.
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: expire-build-context
            Status: Enabled
            ExpirationInDays: 3
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub '${ArtifactBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

  # Role used while building the MicroVM image.
  BuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Ref BuildServicePrincipal
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: hellbox-build
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub '${ArtifactBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:*:${AWS::AccountId}:*'

  # Runtime role. Add policies only if the capsule needs AWS access.
  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Ref BuildServicePrincipal
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

Outputs:
  Region:
    Description: Region this stack and your MicroVMs live in.
    Value: !Ref AWS::Region
  ArtifactBucket:
    Description: artifact_bucket for ~/.hellbox/config.toml
    Value: !Ref ArtifactBucket
  BuildRoleArn:
    Description: build_role_arn for ~/.hellbox/config.toml
    Value: !GetAtt BuildRole.Arn
  ExecutionRoleArn:
    Description: execution_role_arn for ~/.hellbox/config.toml
    Value: !GetAtt ExecutionRole.Arn
